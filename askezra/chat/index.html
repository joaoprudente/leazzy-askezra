*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: "DM Sans", sans-serif; background: var(--navy-deep); color: var(--paper); overflow: hidden; }

/* Nav */
nav {
  height: 56px;
  padding: 0 24px;
  background: rgba(17,28,39,.95);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,255,255,.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.nav-brand {
  font-family: "Manrope", sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--paper);
  letter-spacing: -.03em;
  text-decoration: none;
}

.nav-context {
  font-family: "DM Mono", monospace;
  font-size: 9px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--gold);
  margin-left: 10px;
}

.nav-role {
  font-family: "DM Mono", monospace;
  font-size: 9px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: rgba(247,244,238,.4);
  border: 1px solid rgba(255,255,255,.1);
  padding: 5px 12px;
}

/* Layout */
.layout {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 56px);
}

/* Messages */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}

.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 99px; }

.message {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-width: 88%;
}

.message.user { align-self: flex-end; align-items: flex-end; }
.message.assistant { align-self: flex-start; align-items: flex-start; }

.message-who {
  font-family: "DM Mono", monospace;
  font-size: 9px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--gold-light);
  margin-bottom: 2px;
}

.message.user .message-who { color: rgba(247,244,238,.35); }

.message-bubble {
  padding: 14px 18px;
  font-size: 14px;
  font-weight: 300;
  line-height: 1.75;
  color: rgba(247,244,238,.9);
}

.message.assistant .message-bubble {
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.08);
  border-top: 2px solid var(--gold-light);
}

.message.user .message-bubble {
  background: rgba(201,169,110,.12);
  border: 1px solid rgba(201,169,110,.2);
  color: var(--paper);
}

/* Typing indicator */
.typing {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 14px 18px;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.08);
  border-top: 2px solid var(--gold-light);
  align-self: flex-start;
}

.typing span {
  width: 5px;
  height: 5px;
  background: var(--gold-light);
  border-radius: 50%;
  animation: bounce .9s infinite;
  opacity: .6;
}

.typing span:nth-child(2) { animation-delay: .15s; }
.typing span:nth-child(3) { animation-delay: .3s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: .6; }
  30% { transform: translateY(-5px); opacity: 1; }
}

/* Input */
.input-area {
  padding: 16px;
  border-top: 1px solid rgba(255,255,255,.08);
  background: rgba(17,28,39,.95);
  flex-shrink: 0;
}

.input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  max-width: 720px;
  margin: 0 auto;
}

.input-field {
  flex: 1;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.12);
  color: var(--paper);
  font-family: "DM Sans", sans-serif;
  font-size: 14px;
  font-weight: 300;
  padding: 12px 16px;
  outline: none;
  resize: none;
  min-height: 48px;
  max-height: 120px;
  line-height: 1.5;
  transition: border-color .2s;
}

.input-field::placeholder { color: rgba(247,244,238,.3); }
.input-field:focus { border-color: rgba(201,169,110,.4); }

.send-btn {
  font-family: "DM Mono", monospace;
  font-size: 9px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--navy-deep);
  background: var(--gold-light);
  border: none;
  padding: 0 18px;
  height: 48px;
  cursor: pointer;
  transition: opacity .2s;
  flex-shrink: 0;
}

.send-btn:hover { opacity: .88; }
.send-btn:disabled { opacity: .4; cursor: not-allowed; }

.input-note {
  font-family: "DM Mono", monospace;
  font-size: 9px;
  letter-spacing: .1em;
  color: rgba(247,244,238,.2);
  text-align: center;
  margin-top: 8px;
  text-transform: uppercase;
}

/* Disclaimer */
.disclaimer {
  font-family: "DM Mono", monospace;
  font-size: 9px;
  letter-spacing: .1em;
  color: rgba(247,244,238,.25);
  text-transform: uppercase;
  padding: 10px 16px;
  text-align: center;
  border-top: 1px solid rgba(255,255,255,.05);
  background: var(--navy-deep);
  flex-shrink: 0;
}

@media (min-width: 600px) {
  .messages { padding: 32px 24px; }
  .message { max-width: 72%; }
  .message-bubble { font-size: 15px; }
}

  <script>
    const params = new URLSearchParams(window.location.search);
    const role = params.get('role') || 'tenant';
    const initialQ = params.get('q') || '';

    // Set role label
    const roleLabel = document.getElementById('roleLabel');
    roleLabel.textContent = role === 'landlord' ? 'Landlord' : 'Tenant';

    const messagesEl = document.getElementById('messages');
    const inputField = document.getElementById('inputField');
    const sendBtn = document.getElementById('sendBtn');

    let history = [];
    let isLoading = false;

    // Opening message from Ezra
    const openingMessage = role === 'landlord'
      ? "I'm here to help you understand your position at the end of this tenancy. Before we start — can you tell me what happened? Specifically: when did the tenant move out, and what is the situation with the security deposit?"
      : "I'm here to help you understand where you stand. Before anything else — can you tell me what happened? Specifically: when did you move out, and what has your landlord communicated about the deposit?";

    addMessage('assistant', openingMessage);

    // Auto-send initial question if present
    if (initialQ) {
      inputField.value = initialQ;
      setTimeout(() => sendMessage(), 300);
    }

    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = `message ${role}`;

      const who = document.createElement('div');
      who.className = 'message-who';
      who.textContent = role === 'assistant' ? 'Leazzy' : 'You';

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.textContent = content;

      div.appendChild(who);
      div.appendChild(bubble);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      return div;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.id = 'typing';

      const who = document.createElement('div');
      who.className = 'message-who';
      who.textContent = 'Leazzy';

      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.innerHTML = '<span></span><span></span><span></span>';

      div.appendChild(who);
      div.appendChild(typing);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    async function sendMessage() {
      const text = inputField.value.trim();
      if (!text || isLoading) return;

      inputField.value = '';
      inputField.style.height = 'auto';
      isLoading = true;
      sendBtn.disabled = true;

      addMessage('user', text);
      history.push({ role: 'user', content: text });

      showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history, role })
        });

        const data = await res.json();
        removeTyping();

        const reply = data.content || 'Something went wrong. Please try again.';
        addMessage('assistant', reply);
        history.push({ role: 'assistant', content: reply });

      } catch (err) {
        removeTyping();
        addMessage('assistant', 'Something went wrong. Please try again.');
      }

      isLoading = false;
      sendBtn.disabled = false;
      inputField.focus();
    }

    sendBtn.addEventListener('click', sendMessage);

    inputField.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    inputField.addEventListener('input', () => {
      inputField.style.height = 'auto';
      inputField.style.height = Math.min(inputField.scrollHeight, 120) + 'px';
    });
  </script>
